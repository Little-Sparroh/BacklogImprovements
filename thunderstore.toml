[config]
schemaVersion = "0.0.1"

[package]
namespace = "Sparroh"
name = "BacklogImprovements"
description = "Backlog QoL: preselect directive paths, free next pages, and reroll directives for gats."
websiteUrl = "https://github.com/Little-Sparroh/BacklogImprovements"
containsNsfwContent = false

[package.dependencies]
BepInEx-BepInExPack_Mycopunk = "5.4.2403"
Sparroh-SparrohUILib = "1.1.1"

[build]
icon = "icon.png"
readme = "README.md"
outdir = "build"

[[build.copy]]
source = "bin/Release/netstandard2.1/BacklogImprovements.dll"
target = "BepInEx/plugins/BacklogImprovements.dll"

[[build.copy]]
source = "CHANGELOG.md"
target = "CHANGELOG.md"

[[build.copy]]
source = "LICENSE"
target = "LICENSE"

[publish]
repository = "https://thunderstore.io"
communities = [ "mycopunk" ]

[publish.categories]
mycopunk = [ "client" ]
