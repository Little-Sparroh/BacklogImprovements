[config]
schemaVersion = "0.0.1"

[package]
namespace = "Sparroh"
name = "PreselectBacklog"
description = "A BepInEx mod for MycoPunk that adds automation to the game's directive/backlog system, allowing players to preselect a sequence of directives and automatically progress through them."
websiteUrl = "https://github.com/Little-Sparroh/PreselectBacklog"
containsNsfwContent = false

[package.dependencies]
BepInEx-BepInExPack_Mycopunk = "5.4.2403"

[build]
icon = "icon.png"
readme = "README.md"
outdir = "build"

[[build.copy]]
source = "bin/Release/net48/PreselectBacklog.dll"
target = "BepInEx/plugins/PreselectBacklog.dll"

[[build.copy]]
source = "CHANGELOG.md"
target = "CHANGELOG.md"

[[build.copy]]
source = "LICENSE"
target = "LICENSE"

[publish]
repository = "https://thunderstore.io"
communities = [ "mycopunk" ]

[publish.categories]
mycopunk = [ "client" ]


